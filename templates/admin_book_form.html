{% extends 'base.html' %}
{% block title %}{{ 'Edit Book' if book else 'Add Book' }} - Admin{% endblock %}

{% block content %}
<div class="form-card">
    <h2>{{ 'Edit Book' if book else 'Add a New Book' }}</h2>
    <form method="POST">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="{{ book.title if book else '' }}" required>

        <label for="author">Author</label>
        <input type="text" id="author" name="author" value="{{ book.author if book else '' }}" required>

        <label for="category">Category</label>
        <input type="text" id="category" name="category" value="{{ book.category if book else '' }}" required>

        <label for="isbn">ISBN (optional)</label>
        <input type="text" id="isbn" name="isbn" value="{{ book.isbn if book and book.isbn else '' }}">

        <label for="total_copies">Total Copies</label>
        <input type="number" id="total_copies" name="total_copies" min="1"
               value="{{ book.total_copies if book else 1 }}" required>

        <button type="submit">{{ 'Save Changes' if book else 'Add Book' }}</button>
    </form>
    <p><a href="{{ url_for('admin.manage_books') }}">← Back to book list</a></p>
</div>
{% endblock %}
