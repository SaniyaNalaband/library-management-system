{% extends 'base.html' %}
{% block title %}Log In - Smart Library{% endblock %}

{% block content %}
<section class="auth-cosmic">
    <div class="stars-small"></div>
    <div class="stars-medium"></div>
    <div class="stars-large"></div>
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="nebula nebula-3"></div>

    <div class="auth-cosmic-inner">
        <p class="cosmic-eyebrow">Smart Library</p>
        <h2 class="cosmic-headline">Sign in to your universe of books</h2>

        <div class="form-card form-card--cosmic">
            <h2>Log In</h2>
            <p class="form-card-sub">Enter your details to access your account.</p>
            <form method="POST" action="{{ url_for('auth.login') }}">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>

                <button type="submit">Log In</button>
            </form>
            <p>Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up</a></p>
        </div>
    </div>
</section>
{% endblock %}
